version: "3.9"

services:
  app:
    build: .
    ports:
      - "8000:80"
    environment:
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: household_connect
      DB_USER: household_app
      DB_PASS: Jesuslove@12
      APP_URL: http://localhost:8000
    volumes:
      - ./:/var/www/html
      - ./uploads:/var/www/html/uploads
      - ./storage:/var/www/html/storage
    depends_on:
      - db

  db:
    image: postgres:15
    restart: unless-stopped
    environment:
      POSTGRES_DB: household_connect
      POSTGRES_USER: household_app
      POSTGRES_PASSWORD: Jesuslove@12
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
      - ./database/setup_postgresql.sql:/docker-entrypoint-initdb.d/01_setup.sql:ro

volumes:
  db_data:
